<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picture Call</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      max-width: 500px;
      margin: auto;
      min-height: 100vh;
      background: white;
      padding: 16px;
    }

    h1 {
      text-align: center;
      color: #2563eb;
    }

    video, img {
      width: 100%;
      border-radius: 12px;
      background: #000;
      margin-bottom: 12px;
    }

    canvas {
      display: none;
    }

    button, a {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    button.secondary {
      background: #6b7280;
    }

    .hidden {
      display: none;
    }

    .message {
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
      background: #dbeafe;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .number-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      background: #f9fafb;
    }

    .phone {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .called {
      opacity: 0.5;
      text-decoration: line-through;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>📷 Picture Call</h1>

    <div id="cameraSection">
      <p>Take a photo of your call list.</p>
      <video id="camera" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <button onclick="capturePhoto()">📸 Capture Photo</button>
    </div>

    <div id="previewSection" class="hidden">
      <p>Preview:</p>
      <img id="preview" />
      <button onclick="extractNumbers()">🤖 Extract Numbers</button>
      <button class="secondary" onclick="retakePhoto()">Retake Photo</button>
    </div>

    <div id="loadingSection" class="hidden">
      <div class="message">Scanning image... this can take a few seconds.</div>
    </div>

    <div id="resultsSection" class="hidden">
      <div id="message"></div>
      <div id="numbersList"></div>
      <button class="secondary" onclick="startOver()">Scan Another List</button>
    </div>
  </div>

  <script>
    let capturedImage = null;
    let numbers = [];
    let calledNumbers = new Set();

    window.onload = startCamera;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });

        document.getElementById("camera").srcObject = stream;
      } catch (error) {
        showMessage("Camera permission blocked. Allow camera access in your browser.", "error");
      }
    }

    function capturePhoto() {
      const video = document.getElementById("camera");
      const canvas = document.getElementById("canvas");
      const context = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      capturedImage = canvas.toDataURL("image/jpeg", 0.9);

      document.getElementById("preview").src = capturedImage;
      document.getElementById("cameraSection").classList.add("hidden");
      document.getElementById("previewSection").classList.remove("hidden");
    }

    function retakePhoto() {
      capturedImage = null;
      document.getElementById("previewSection").classList.add("hidden");
      document.getElementById("cameraSection").classList.remove("hidden");
    }

    async function extractNumbers() {
      if (!capturedImage) return;

      document.getElementById("previewSection").classList.add("hidden");
      document.getElementById("loadingSection").classList.remove("hidden");

      try {
        const result = await Tesseract.recognize(capturedImage, "eng");
        const text = result.data.text;

        numbers = findPhoneNumbers(text);

        document.getElementById("loadingSection").classList.add("hidden");
        document.getElementById("resultsSection").classList.remove("hidden");

        if (numbers.length === 0) {
          showMessage("No numbers found. Try a clearer photo with better lighting.", "error");
        } else {
          showMessage("Found " + numbers.length + " number(s).", "success");
          displayNumbers();
        }
      } catch (error) {
        document.getElementById("loadingSection").classList.add("hidden");
        document.getElementById("resultsSection").classList.remove("hidden");
        showMessage("Error: " + error.message, "error");
      }
    }

    function findPhoneNumbers(text) {
      const matches = text.match(/(?:\+44\s?|0)(?:[\d\s\-().]){9,15}/g) || [];

      const cleaned = matches
        .map(number => number.replace(/[^\d+]/g, ""))
        .map(number => {
          if (number.startsWith("+44")) return number;
          if (number.startsWith("44")) return "+" + number;
          return number;
        })
        .filter(number => {
          const digitsOnly = number.replace(/\D/g, "");
          return digitsOnly.length >= 10 && digitsOnly.length <= 13;
        });

      return [...new Set(cleaned)];
    }

    function displayNumbers() {
      const list = document.getElementById("numbersList");

      list.innerHTML = numbers.map((number, index) => {
        const called = calledNumbers.has(number);

        return `
          <div class="number-card">
            <div class="phone ${called ? "called" : ""}">${number}</div>
            <a href="tel:${number}">☎️ Call</a>
            <button onclick="toggleCalled('${number}')">
              ${called ? "Undo Called" : "Mark Called"}
            </button>
          </div>
        `;
      }).join("");
    }

    function toggleCalled(number) {
      if (calledNumbers.has(number)) {
        calledNumbers.delete(number);
      } else {
        calledNumbers.add(number);
      }

      displayNumbers();
    }

    function showMessage(text, type) {
      document.getElementById("message").innerHTML =
        `<div class="message ${type}">${text}</div>`;
    }

    function startOver() {
      capturedImage = null;
      numbers = [];
      calledNumbers = new Set();

      document.getElementById("message").innerHTML = "";
      document.getElementById("numbersList").innerHTML = "";

      document.getElementById("resultsSection").classList.add("hidden");
      document.getElementById("cameraSection").classList.remove("hidden");
    }
  </script>
</body>
</html>
