<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Call - Extract & Dial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }

        .camera-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 12px;
        }

        #camera {
            width: 100%;
            display: block;
            aspect-ratio: 4/3;
        }

        #canvas {
            display: none;
        }

        .camera-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:active {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .message.info {
            background: #dbeafe;
            color: #0c2340;
            border-left: 4px solid #3b82f6;
        }

        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .contact-item {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .contact-item.completed {
            opacity: 0.6;
            background: #f0fdf4;
        }

        .contact-info {
            flex: 1;
        }

        .contact-phone {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .contact-item.completed .contact-phone {
            text-decoration: line-through;
            color: #999;
        }

        .contact-actions {
            display: flex;
            gap: 8px;
            margin-left: 8px;
        }

        .contact-actions button,
        .contact-actions a {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .call-btn {
            background: #3b82f6;
            color: white;
        }

        .check-btn {
            background: #e5e7eb;
            color: #333;
            width: 32px;
            padding: 8px;
        }

        .check-btn.checked {
            background: #10b981;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: #f0f4ff;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .hidden {
            display: none;
        }

        .preview-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
            max-height: 300px;
            object-fit: cover;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .setup-message {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            color: #92400e;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Picture Call</h1>
            <p>Snap a list • Extract numbers • Call instantly</p>
        </div>

        <div class="content">
            <div class="section" id="cameraSection">
                <div class="section-title">Step 1: Take a Photo</div>
                <div class="camera-container">
                    <video id="camera" playsinline autoplay></video>
                    <canvas id="canvas"></canvas>
                </div>
                <div class="camera-controls">
                    <button class="btn btn-primary" onclick="capturePhoto()">
                        📸 Capture Photo
                    </button>
                </div>
            </div>

            <div class="section hidden" id="previewSection">
                <div class="section-title">Photo Preview</div>
                <img id="preview" class="preview-image" />
                <div class="camera-controls">
                    <button class="btn btn-secondary" onclick="retakePhoto()">
                        🔄 Retake Photo
                    </button>
                    <button class="btn btn-primary" onclick="extractNumbers()">
                        🤖 Extract Numbers
                    </button>
                </div>
            </div>

            <div class="section hidden" id="extractingSection">
                <div class="loading">
                    <span class="spinner"></span>
                    Analyzing image...
                </div>
                <p style="text-align: center; font-size: 13px; color: #999; margin-top: 12px;">
                    This may take a few seconds
                </p>
            </div>

            <div class="section hidden" id="resultsSection">
                <div id="messageContainer"></div>
                
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">Total Numbers</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="contacts-list" id="contactsList"></div>

                <div class="camera-controls" style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="startOver()">
                        📷 Scan Another List
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let videoStream = null;
        let capturedImage = null;
        let contacts = [];
        let completedCalls = new Set();

        window.addEventListener('load', initCamera);

        async function initCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                document.getElementById('camera').srcObject = videoStream;
            } catch (err) {
                showMessage('Camera access denied. Please enable camera permissions in your phone settings.', 'error');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('camera');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            capturedImage = canvas.toDataURL('image/jpeg', 0.85);
            
            document.getElementById('preview').src = capturedImage;
            document.getElementById('cameraSection').classList.add('hidden');
            document.getElementById('previewSection').classList.remove('hidden');
        }

        function retakePhoto() {
            document.getElementById('cameraSection').classList.remove('hidden');
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            capturedImage = null;
        }

        async function extractNumbers() {
            if (!capturedImage) return;

            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('extractingSection').classList.remove('hidden');

            try {
                const base64Image = capturedImage.split(',')[1];
                
                const response = await fetch('/api/extract-numbers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64Image
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to extract numbers');
                }

                const data = await response.json();
                const numbersText = data.numbers;
                
                contacts = numbersText
                    .split('\n')
                    .map(line => line.trim())
                    .filter(line => line && /[\d+\-\s()]{7,}/.test(line))
                    .map((phone, i) => ({
                        id: i,
                        phone: phone
                    }));

                if (contacts.length === 0) {
                    showMessage('No phone numbers found. Try a clearer photo.', 'error');
                } else {
                    showMessage(`✓ Found ${contacts.length} phone number(s)!`, 'success');
                    displayContacts();
                }

            } catch (err) {
                showMessage('Error: ' + err.message, 'error');
            }

            document.getElementById('extractingSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
        }

        function displayContacts() {
            const list = document.getElementById('contactsList');
            
            if (contacts.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No numbers found</p></div>';
                return;
            }

            list.innerHTML = contacts.map(contact => `
                <div class="contact-item ${completedCalls.has(contact.id) ? 'completed' : ''}">
                    <div class="contact-info">
                        <div class="contact-phone">${contact.phone}</div>
                    </div>
                    <div class="contact-actions">
                        <button class="check-btn ${completedCalls.has(contact.id) ? 'checked' : ''}" 
                                onclick="toggleComplete(${contact.id})"
                                title="Mark as called">
                            ✓
                        </button>
                        <a href="tel:${contact.phone}" class="call-btn">☎️</a>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function toggleComplete(id) {
            if (completedCalls.has(id)) {
                completedCalls.delete(id);
            } else {
                completedCalls.add(id);
            }
            displayContacts();
        }

        function updateStats() {
            const total = contacts.length;
            const completed = completedCalls.size;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function startOver() {
            contacts = [];
            completedCalls = new Set();
            capturedImage = null;
            document.getElementById('cameraSection').classList.remove('hidden');
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('messageContainer').innerHTML = '';
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
        }
    </script>
</body>
</html>
